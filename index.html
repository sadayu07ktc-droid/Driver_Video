<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>วิดีโอแนะนำคนขับ · SSB Smart Supply</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --green-deep:#102a1d; --green:#3f7d4f; --green-soft:#e7f1e8;
    --amber:#e8920c; --amber-soft:#fdf0d9; --cream:#fbf7ef;
    --ink:#20231d; --ink-soft:#5d6356; --line:#e7e2d6; --white:#fff; --brown:#7B4F2E;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden}
  body{font-family:'Sarabun',-apple-system,'Noto Sans Thai',sans-serif;background:#06120c}
  .player{max-width:480px;height:100%;margin:0 auto;position:relative;display:flex;flex-direction:column;
    background:radial-gradient(120% 90% at 50% 0,#1a3826,#0a1a11 70%);color:#fff;overflow:hidden}

  /* top bar */
  .pbar{padding:13px 16px 0;flex:0 0 auto;z-index:5}
  .pbar-row{display:flex;align-items:center;justify-content:space-between;font-size:12px}
  .pbar-brand{display:flex;align-items:center;gap:8px;font-family:'Kanit';font-weight:600;font-size:14px}
  .pbar-brand .d{width:23px;height:23px;border-radius:7px;background:var(--amber);display:grid;place-items:center;font-size:13px}
  .pbar-count{color:rgba(255,255,255,.6);font-family:'Kanit';font-weight:600}
  .track{margin-top:10px;height:4px;border-radius:99px;background:rgba(255,255,255,.14);overflow:hidden}
  .track > i{display:block;height:100%;background:var(--amber);border-radius:99px;width:0;transition:width .5s ease}

  /* stage */
  .vArea{flex:1;min-height:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:12px 18px;overflow:hidden;position:relative}
  .kicker{flex:0 0 auto;font-family:'Kanit';font-weight:600;font-size:13px;letter-spacing:.5px;color:var(--amber);background:rgba(232,146,12,.13);padding:6px 15px;border-radius:99px;margin-bottom:14px;text-align:center;animation:fade .5s both}
  .vInner{width:100%;animation:fade .55s both}
  @keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

  /* subtitle + controls */
  .subwrap{flex:0 0 auto;padding:0 16px;z-index:5}
  .voicebar{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:9px}
  .vlabel{font-size:11px;color:rgba(255,255,255,.55);font-family:'Kanit';font-weight:600;white-space:nowrap}
  .vsel{max-width:200px;background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.18);border-radius:9px;padding:5px 9px;font-size:12px;font-family:'Sarabun';outline:none}
  .vsel option{color:#111}
  .cc{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-family:'Kanit';font-weight:700;color:rgba(255,255,255,.55);margin:0 auto 6px;border:1px solid rgba(255,255,255,.22);padding:1px 7px;border-radius:5px}
  .sub{background:rgba(8,16,11,.72);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:13px 16px;font-size:16px;line-height:1.55;text-align:center;min-height:64px;display:flex;align-items:center;justify-content:center;font-weight:500}
  .ctrls{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 0 calc(16px + env(safe-area-inset-bottom))}
  .cbtn{background:rgba(255,255,255,.1);border:none;color:#fff;width:48px;height:48px;border-radius:14px;font-size:20px;cursor:pointer;display:grid;place-items:center;transition:transform .12s,background .2s}
  .cbtn:active{transform:scale(.92)}
  .cbtn.play{width:66px;height:66px;border-radius:20px;background:var(--amber);color:#1c1100;font-size:27px;box-shadow:0 8px 22px rgba(232,146,12,.36)}

  /* start overlay */
  .overlay{position:absolute;inset:0;z-index:30;background:radial-gradient(120% 90% at 50% 40%,#1c3826,#081710);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px;gap:18px}
  .overlay.hide{display:none}
  .ov-logo{font-family:'Kanit';font-weight:700;font-size:13px;letter-spacing:1px;color:var(--amber);background:rgba(232,146,12,.14);padding:6px 16px;border-radius:99px}
  .ov-title{font-family:'Kanit';font-weight:700;font-size:29px;line-height:1.2}
  .ov-sub{color:rgba(255,255,255,.72);font-size:15px;max-width:300px;line-height:1.6}
  .ov-play{margin-top:6px;width:84px;height:84px;border-radius:26px;background:var(--amber);color:#1c1100;font-size:36px;display:grid;place-items:center;border:none;cursor:pointer;box-shadow:0 12px 30px rgba(232,146,12,.4);transition:transform .15s}
  .ov-play:active{transform:scale(.94)}
  .ov-note{font-size:12.5px;color:rgba(255,255,255,.5);display:flex;align-items:center;gap:6px}

  /* ===== shared mock styles (เหมือนในคู่มือ) ===== */
  .mock{border-radius:16px;overflow:hidden;border:1px solid var(--line);box-shadow:0 10px 30px rgba(0,0,0,.35);background:#fff;color:var(--ink)}
  .mm-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#d9ceb0}
  .mm-tile{background:#fff;min-height:84px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;position:relative;padding:6px 4px}
  .mm-ic{font-size:24px;line-height:1}
  .mm-th{font-family:'Kanit';font-weight:600;font-size:11.5px;color:#4e7a3e;text-align:center;line-height:1.12}
  .mm-en{font-size:6.5px;letter-spacing:.6px;color:#a6b894;font-weight:700}
  .mm-tile.hl{box-shadow:inset 0 0 0 3px var(--amber);background:#fffaf0;z-index:2;animation:pulse 1.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{box-shadow:inset 0 0 0 3px var(--amber)}50%{box-shadow:inset 0 0 0 3px var(--amber),0 0 0 5px rgba(232,146,12,.22)}}
  .mm-tag{position:absolute;top:-7px;right:-3px;background:var(--amber);color:#3a2400;font-family:'Kanit';font-weight:700;font-size:9px;padding:2px 7px;border-radius:99px;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,.25);z-index:3}
  .mm-bar{background:#e7dfc9;display:flex;align-items:center;padding:8px 13px;gap:9px}
  .mm-kb{width:28px;height:21px;border-radius:6px;background:#f3eede;display:grid;place-items:center;font-size:11px}
  .mm-menu{flex:1;text-align:center;font-family:'Kanit';font-weight:600;color:#5d6356;font-size:14px}

  .fm{padding:13px}
  .fm-lbl{font-family:'Kanit';font-weight:600;font-size:12px;color:var(--green);margin:11px 0 6px;display:flex;align-items:center;gap:6px}
  .fm-lbl:first-child{margin-top:0}
  .fm-photo{border:2px dashed #cdd6c6;border-radius:11px;padding:11px;display:flex;align-items:center;gap:10px;background:#fafcf8;margin-bottom:7px}
  .fm-photo .pi{font-size:19px}
  .fm-photo .pt{font-size:12.5px;color:var(--ink-soft);font-weight:500;flex:1;line-height:1.3}
  .fm-ocr{font-family:'Kanit';font-weight:700;font-size:12px;color:#fff;background:var(--green);padding:3px 8px;border-radius:7px;white-space:nowrap}
  .fm-weigh{border:1px solid #f0d9a8;background:var(--amber-soft);border-radius:11px;padding:10px 11px;margin-bottom:7px}
  .fm-weigh .wt{font-family:'Kanit';font-weight:600;font-size:12px;color:#a96a06;display:flex;align-items:center;gap:6px;margin-bottom:7px}
  .fm-chips{display:flex;gap:5px;flex-wrap:wrap}
  .fm-chip{background:#fff;border:1px solid #f0d9a8;border-radius:7px;padding:4px 8px;font-size:11.5px;color:#7a5410;font-weight:600}
  .fm-chip b{color:#5d3f08;font-family:'Kanit'}
  .fm-row{display:flex;gap:7px}
  .fm-input{flex:1;border:1px solid var(--line);border-radius:9px;padding:7px 10px;font-size:13px;color:#a4a999;background:#fff}
  .fm-input b{display:block;font-size:9.5px;color:var(--green);font-family:'Kanit';font-weight:600;margin-bottom:2px}
  .fm-btn{margin-top:12px;border-radius:11px;padding:12px;text-align:center;font-family:'Kanit';font-weight:700;font-size:14px;color:#fff}
  .fm-btn.green{background:var(--green)}
  .fm-btn.brown{background:var(--brown)}
  .fm-note{background:#f4f1e7;border-radius:9px;padding:8px 11px;font-size:11.5px;color:var(--ink-soft);margin-bottom:7px;line-height:1.5}
  .fm-gps{border:1px solid #cfe0d2;background:#eef6ef;border-radius:10px;padding:9px 11px;margin-bottom:7px}
  .fm-gps-top{display:flex;justify-content:space-between;align-items:center;font-family:'Kanit';font-weight:600;font-size:11.5px;color:var(--green)}
  .fm-gps-tag{background:var(--green);color:#fff;font-size:8.5px;font-weight:700;padding:1px 6px;border-radius:6px}
  .fm-gps-val{font-family:'Kanit';font-weight:700;font-size:17px;color:var(--green);margin:3px 0 6px}
  .fm-gps-btn{background:#d9ead9;color:#1c3a2a;font-family:'Kanit';font-weight:600;font-size:11.5px;text-align:center;padding:6px;border-radius:8px}
  .fm-load-lbl{font-family:'Kanit';font-weight:600;font-size:11.5px;color:var(--green);margin:9px 0 5px}
  .fm-load{display:flex;gap:6px}
  .fm-load-chip{flex:1;text-align:center;border:1.5px solid var(--line);border-radius:9px;padding:7px;font-size:12px;font-weight:600;color:var(--ink-soft);background:#fff}
  .fm-load-chip.on.green{background:#e7f4e9;border-color:var(--green);color:var(--green)}
  .fm-load-chip.on.orange{background:#fdeccc;border-color:var(--amber);color:#a96a06}

  /* title / simpletext / end cards */
  .panel{text-align:center;padding:10px}
  .panel .pic{font-size:54px;margin-bottom:14px}
  .panel h2{font-family:'Kanit';font-weight:700;font-size:26px;line-height:1.2}
  .panel .ps{color:rgba(255,255,255,.78);font-size:15px;margin-top:10px;line-height:1.55}
  .ministeps{margin:18px auto 0;max-width:330px;display:flex;flex-direction:column;gap:9px;text-align:left}
  .ministeps div{display:flex;gap:10px;align-items:center;font-size:14.5px;color:rgba(255,255,255,.92);background:rgba(255,255,255,.06);border-radius:11px;padding:9px 12px}
  .ministeps .mn{flex:0 0 23px;width:23px;height:23px;border-radius:7px;background:rgba(232,146,12,.22);color:var(--amber);font-family:'Kanit';font-weight:700;font-size:12px;display:grid;place-items:center}
  .vt-chip{background:rgba(232,146,12,.18);color:var(--amber);font-family:'Kanit';font-weight:600;font-size:11px;padding:2px 8px;border-radius:7px;white-space:nowrap}

  @media (prefers-reduced-motion:reduce){.mm-tile.hl{animation:none}}
</style>
</head>
<body>
<div class="player">
  <div class="pbar">
    <div class="pbar-row">
      <div class="pbar-brand"><span class="d">🚛</span> คู่มือคนขับ</div>
      <div class="pbar-count" id="count"></div>
    </div>
    <div class="track"><i id="track"></i></div>
  </div>

  <div class="vArea">
    <div class="kicker" id="kicker"></div>
    <div class="vInner" id="vInner"></div>
  </div>

  <div class="subwrap">
    <div class="voicebar"><span class="vlabel">🗣️ เสียงพากย์ (ชาย)</span><select id="voiceSel" class="vsel" onchange="pickVoice(this.value)"></select></div>
    <div style="text-align:center"><span class="cc">● CC คำบรรยาย</span></div>
    <div class="sub" id="sub"></div>
    <div class="ctrls">
      <button class="cbtn" onclick="restart()" aria-label="เริ่มใหม่">⟲</button>
      <button class="cbtn" onclick="prev()" aria-label="ก่อนหน้า">⏮</button>
      <button class="cbtn play" id="playBtn" onclick="togglePlay()" aria-label="เล่น/หยุด">▶</button>
      <button class="cbtn" onclick="next()" aria-label="ถัดไป">⏭</button>
      <button class="cbtn" id="spdBtn" onclick="cycleSpeed()" aria-label="ความเร็ว" style="font-size:14px;font-family:'Kanit';font-weight:700">1x</button>
      <button class="cbtn" id="muteBtn" onclick="toggleMute()" aria-label="เสียง">🔊</button>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <div class="ov-logo">SSB SMART SUPPLY</div>
    <div class="ov-title">วิดีโอแนะนำคนขับรถ</div>
    <div class="ov-sub">วิ่งงานครบทุกขั้นตอน ตั้งแต่รับงานจนปิดงาน พร้อมเสียงพากย์และคำบรรยาย</div>
    <button class="ov-play" onclick="startVideo()" aria-label="เริ่มเล่น">▶</button>
    <div class="ov-note">🔊 เปิดเสียงในเครื่องเพื่อฟังเสียงพากย์</div>
  </div>
</div>

<script>
const MENU = [
  {ic:'📋', th:'รับงาน', en:'ACCEPT JOB'},
  {ic:'📍', th:'อัปเดตงานว่าง', en:'AVAILABLE JOBS'},
  {ic:'🕘', th:'ประวัติงาน', en:'JOB HISTORY'},
  {ic:'⏰', th:'ลงเวลา เข้า-ออก', en:'TIME CLOCK'},
  {ic:'🔔', th:'แจ้งลา / แจ้งซ่อม', en:'LEAVE / REPAIR'},
  {ic:'🗒️', th:'สรุปงาน', en:'JOB SUMMARY'}
];
function menuMock(hl){
  const set=(hl==null||hl==='all')?null:(Array.isArray(hl)?hl:[hl]);
  const tiles=MENU.map(m=>{const on=set&&set.includes(m.th);
    return `<div class="mm-tile ${on?'hl':''}">${on?'<span class="mm-tag">👆 กดปุ่มนี้</span>':''}<div class="mm-ic">${m.ic}</div><div class="mm-th">${m.th}</div><div class="mm-en">${m.en}</div></div>`;}).join('');
  return `<div class="mock"><div class="mm-grid">${tiles}</div><div class="mm-bar"><div class="mm-kb">⌨️</div><div class="mm-menu">เมนู ▾</div></div></div>`;
}
function flexMock(){
  return `<div class="mock"><div style="background:#4A7C3F;color:#fff;padding:11px 13px"><div style="font-family:'Kanit';font-weight:700;font-size:14px">🚛 มีงานใหม่!</div><div style="font-size:10.5px;color:#D6E8D0;margin-top:2px">ORD-260628-xxx</div></div><div style="padding:11px 13px;font-size:12.5px;color:#5d6356;line-height:1.8">🌴 สวน: คลองพลู<br>📍 จุดรับ: ลานเทฯ<br>📦 ประเภท: ปาล์ม</div><div style="padding:0 11px 11px;display:flex;flex-direction:column;gap:6px"><div class="fm-btn green" style="margin:0">✅ รับงาน</div><div style="border:1px solid var(--line);border-radius:11px;padding:10px;text-align:center;font-family:'Kanit';font-weight:600;font-size:13px;color:#9aa08f">❌ ปฏิเสธงาน</div></div></div>`;
}
function formMock(type){
  const P=(l,o)=>`<div class="fm-photo"><span class="pi">📷</span><span class="pt">${l}</span>${o?`<span class="fm-ocr">${o}</span>`:''}</div>`;
  const W=(l)=>`<div class="fm-weigh"><div class="wt">⚖️ ${l}</div><div class="fm-chips"><span class="fm-chip">หนัก <b>50,660</b></span><span class="fm-chip">เบา <b>20,650</b></span><span class="fm-chip">สุทธิ <b>30,010</b></span></div></div>`;
  const L=(t)=>`<div class="fm-lbl">${t}</div>`, B=(c,t)=>`<div class="fm-btn ${c}">${t}</div>`;
  const GPS=(v)=>`<div class="fm-gps"><div class="fm-gps-top"><span>📡 เลขไมล์รถ (จาก GPS)</span><span class="fm-gps-tag">DTC</span></div><div class="fm-gps-val">${v} กม.</div><div class="fm-gps-btn">📡 ดึงเลขไมล์จาก GPS</div></div>`;
  const LOAD=(st)=>`<div class="fm-load-lbl">สภาพรถช่วงนี้</div><div class="fm-load"><span class="fm-load-chip ${st==='เบา'?'on green':''}">🟢 รถเบา</span><span class="fm-load-chip ${st==='หนัก'?'on orange':''}">🟠 รถหนัก</span></div>`;
  const MH=(hubL,mileV,hubV,load)=>GPS(mileV)+P(hubL,hubV)+LOAD(load);
  const INV=(l)=>`<div class="fm-weigh"><div class="wt">🧾 ${l}</div><div class="fm-chips"><span class="fm-chip">หนัก <b>50,660</b></span><span class="fm-chip">เบา <b>20,650</b></span><span class="fm-chip">สุทธิ <b>30,010</b></span><span class="fm-chip">ราคา/กก. <b>5.20</b></span><span class="fm-chip">ราคารวม <b>156,052</b></span></div></div>`;
  const SUM=(l,v)=>`<div style="display:flex;justify-content:space-between;gap:10px;font-size:13px;padding:6px 0;border-bottom:1px dashed var(--line)"><span style="color:var(--ink-soft)">${l}</span><b style="font-family:'Kanit';color:var(--green);text-align:right">${v}</b></div>`;
  let s='';
  if(type==='start') s=L('📍 เลขไมล์ GPS + ถ่ายดุมล้อ')+MH('รูปเลขดุมล้อเริ่ม','43,210','43,541','เบา')+B('green','🚀 ยืนยันออกโรงงาน');
  else if(type==='rampDrop') s=`<div class="fm-note">วางกระบะที่ลาน ไม่ต้องถ่ายใบชั่ง</div>`+MH('รูปเลขดุมล้อ','43,260','43,580','เบา')+B('brown','📍 ยืนยันถึงลานวางกระบะ');
  else if(type==='client') s=`<div class="fm-note">ระบบดึงเลขไมล์ GPS ให้ แล้วถ่ายดุมล้อ (ยังไม่ชั่งน้ำหนัก)</div>`+MH('รูปเลขดุมล้อออกจากลูกค้า','69,856','43,541','หนัก')+B('green','🌴 ยืนยันออกจากลูกค้า');
  else if(type==='ramp') s=MH('รูปเลขดุมล้อ','86,774','117,748','หนัก')+L('⚖️ ใบชั่งลานเท')+W('ใบชั่งลานเท')+B('brown','🏭 ยืนยันกลับถึงลานขากลับ');
  else if(type==='factory') s=L('🧾 ใบชั่งลูกค้า / ใบชั่งลานเท ที่โรงงาน')+INV('ใบชั่งลูกค้า')+W('ใบชั่งลานเท')+L('📍 เลขไมล์ GPS + ดุมล้อ หลังชั่ง')+MH('รูปเลขดุมล้อหลังชั่ง','69,899','43,590','หนัก')+L('⛽ เติมน้ำมันที่โรงงาน')+`<div class="fm-row"><div class="fm-input"><b>จำนวนลิตร</b>20</div><div class="fm-input"><b>ราคา/ลิตร</b>30.01</div></div>`+L('💸 ค่าใช้จ่ายอื่น')+`<div class="fm-chips"><span class="fm-chip">น้ำมันทาง</span><span class="fm-chip">ทางด่วน</span><span class="fm-chip">ค่าซ่อมนอก</span><span class="fm-chip">ค่าลงของ</span><span class="fm-chip">ค่าเด็กลงของ</span></div>`+B('green','📋 ดูสรุปก่อนส่ง');
  else if(type==='preview') s=`<div style="font-family:'Kanit';font-weight:700;font-size:14px;color:var(--green);margin-bottom:8px">🔍 ตรวจทานก่อนส่ง</div>`+SUM('เลขไมล์ เริ่ม → จบ','43,210 → 69,899')+SUM('ระยะทางรวม','26,689 กม.')+SUM('น้ำหนักสุทธิ','30,010 กก.')+SUM('ราคา/กก.','5.20 บาท')+SUM('ราคารวม','156,052 บาท')+SUM('ค่าน้ำมัน','600.20 บาท')+SUM('ค่าใช้จ่ายอื่น','350 บาท')+`<div class="fm-note" style="margin-top:9px">เลขหรือราคาผิด? กดปุ่มซ้ายเพื่อกลับไปแก้ได้</div>`+`<div class="fm-row" style="margin-top:11px"><div class="fm-btn" style="margin:0;flex:1;background:#fff;color:var(--green);border:1px solid var(--line)">✏️ กลับไปแก้ไข</div><div class="fm-btn green" style="margin:0;flex:1">✅ ยืนยันส่ง</div></div>`;
  return `<div class="mock"><div class="fm">${s}</div></div>`;
}

// ── ฉากวิดีโอ ──

function visHtml(v){
  if(v.t==='menu') return menuMock(v.hl);
  if(v.t==='form') return formMock(v.f);
  if(v.t==='flex') return flexMock();
  if(v.t==='title') return `<div class="panel"><div class="pic">🚛</div><h2>วิดีโอแนะนำคนขับรถ</h2><div class="ps">SSB Smart Supply</div></div>`;
  if(v.t==='reg') return `<div class="panel"><div class="pic">📝</div><div class="ministeps"><div><span class="mn">1</span> เลือก “4 คนขับรถ”</div><div><span class="mn">2</span> ชื่อ-นามสกุล + เบอร์โทร</div><div><span class="mn">3</span> เลือกประเภทรถ<span style="margin-left:auto;display:flex;gap:5px"><span class="vt-chip">6 ล้อ</span><span class="vt-chip">10 ล้อ</span><span class="vt-chip">เทรลเลอร์</span></span></div><div><span class="mn">4</span> พิมพ์ทะเบียนรถ</div><div><span class="mn">5</span> รอแอดมินอนุมัติ Active</div></div><div style="margin-top:9px;font-size:11px;color:rgba(255,255,255,.45)">* ตัวอย่างประเภทรถ — ปรับตามจริงได้</div></div>`;
  if(v.t==='end') return `<div class="panel"><div class="pic">✅</div><h2>พร้อมวิ่งงานแล้ว!</h2><div class="ministeps"><div><span class="mn">✓</span> งานวิ่งจริงอยู่ในปุ่ม “รับงาน”</div><div><span class="mn">✓</span> ถ่ายเลขให้ชัด OCR อ่านแม่น</div><div><span class="mn">✓</span> เลขดุมล้อห้ามถอยหลัง</div><div><span class="mn">✓</span> ลงค่าใช้จ่ายให้ครบก่อนปิดงาน</div></div></div>`;
  return '';
}

// ── player state ──
let idx=0, playing=false, muted=false, playId=0, advanceTimer=null, rate=1;
const RATES=[0.85,1,1.25];
let thVoice=null, voicesTH=[];
const $=id=>document.getElementById(id);
const MALE_HINT=/pattara|niran|niwat|liam|chai|ผู้ชาย|ชาย|\bmale\b|man/i;
const FEMALE_HINT=/kanya|premwadee|narisa|woman|\bfemale\b|หญิง/i;
let voiceGender='m';   // m=ครับ, f=ค่ะ
function genderOf(v){
  if(!v) return 'm';
  if(FEMALE_HINT.test(v.name)) return 'f';
  if(MALE_HINT.test(v.name))   return 'm';
  return 'm';   // เดาไม่ออก → ใช้ ครับ เป็นค่าตั้งต้น
}
function particle(){ return voiceGender==='f' ? 'ค่ะ' : 'ครับ'; }
function applyParticle(t){ return (t||'').replace(/\{p\}/g, particle()); }
function loadVoices(){
  const vs=(window.speechSynthesis?speechSynthesis.getVoices():[])||[];
  voicesTH=vs.filter(v=>v.lang&&v.lang.toLowerCase().startsWith('th'));
  thVoice = voicesTH.find(v=>MALE_HINT.test(v.name))
         || voicesTH.find(v=>!FEMALE_HINT.test(v.name))
         || voicesTH[0] || null;
  voiceGender=genderOf(thVoice);
  populateVoiceSelect();
}
function populateVoiceSelect(){
  const sel=$('voiceSel'); if(!sel) return;
  if(!voicesTH.length){ sel.innerHTML='<option>— ไม่มีเสียงไทยในเครื่อง —</option>'; sel.disabled=true; return; }
  sel.disabled=false;
  sel.innerHTML=voicesTH.map((v,i)=>`<option value="${i}" ${v===thVoice?'selected':''}>${v.name}</option>`).join('');
}
function pickVoice(i){ thVoice=voicesTH[+i]||thVoice; voiceGender=genderOf(thVoice); stopAll(); render(); if(playing) playFrom(idx); }
if(window.speechSynthesis){ speechSynthesis.onvoiceschanged=loadVoices; loadVoices(); }

function estDur(t){ return Math.max(3800, t.length*58)/rate; }

function stopAll(){ playId++; if(window.speechSynthesis) speechSynthesis.cancel(); clearTimeout(advanceTimer); }

function render(){
  const sc=SCENES[idx];
  $('kicker').textContent=sc.kicker;
  $('vInner').innerHTML=visHtml(sc.vis);
  $('sub').textContent=applyParticle(sc.sub);
  $('track').style.width=(idx/(SCENES.length-1))*100+'%';
  $('count').textContent=`ฉาก ${idx+1} / ${SCENES.length}`;
  // restart fade
  $('kicker').style.animation='none'; $('vInner').style.animation='none';
  void $('vInner').offsetWidth;
  $('kicker').style.animation=''; $('vInner').style.animation='';
  requestAnimationFrame(fitVisual);
  updateUI();
}
function fitVisual(){
  const area=document.querySelector('.vArea'), inner=$('vInner'), kick=$('kicker');
  inner.style.transform='none'; inner.style.marginTop='0';
  const avail=area.clientHeight-kick.offsetHeight-22;
  const h=inner.scrollHeight;
  let s=1;
  if(h>avail) s=Math.max(0.28, avail/h);   // ย่อจนพอดี ไม่มีพื้นล่างค้าง = เห็นครบ
  inner.style.transformOrigin='top center';
  inner.style.transform=`scale(${s})`;
  // จัดให้อยู่กลางแนวตั้ง (เผื่อรูปสั้นกว่าพื้นที่)
  const scaledH=h*s;
  if(scaledH<avail) inner.style.marginTop=((avail-scaledH)/2)+'px';
}
window.addEventListener('resize',fitVisual);

// แบ่งข้อความเป็นวรรคสั้นๆ เพื่อให้มีจังหวะหยุดหายใจ ฟังเหมือนคนพูด
function chunkThai(text){
  const parts=text.split(/\s+/).filter(Boolean);
  const chunks=[]; let cur='';
  for(const p of parts){
    cur = cur ? cur+' '+p : p;
    if(cur.length>=16){ chunks.push(cur); cur=''; }   // จบวรรคเมื่อยาวพอ แล้วหยุดจังหวะ
  }
  if(cur) chunks.push(cur);
  return chunks;
}
function speak(text,onDone){
  text=applyParticle(text);
  if(!thVoice) loadVoices();   // เผื่อเสียงเพิ่งโหลดเสร็จ ลองหาเสียงไทยอีกครั้ง
  if(muted || !window.speechSynthesis || !thVoice){ advanceTimer=setTimeout(onDone, estDur(text)); return; }
  speechSynthesis.cancel();
  const sid=playId;                       // ผูกกับรอบเล่นปัจจุบัน (กดหยุด/เปลี่ยนฉาก = ยกเลิก)
  const chunks=chunkThai(text);
  let i=0;
  const speakNext=()=>{
    if(sid!==playId || !playing){ return; }
    if(i>=chunks.length){ onDone(); return; }
    const u=new SpeechSynthesisUtterance(chunks[i]);
    u.voice=thVoice; u.lang='th-TH';
    u.rate=Math.max(0.55,Math.min(1.25,0.82*rate));   // อ่านช้าลง ฟังชัดขึ้น
    u.pitch=1;
    const advance=()=>{ if(sid!==playId || !playing) return; i++; advanceTimer=setTimeout(speakNext, 230/rate); };
    u.onend=advance;
    u.onerror=advance;
    speechSynthesis.speak(u);
  };
  speakNext();   // เริ่มทันที (อยู่ในจังหวะการกดปุ่ม — สำคัญสำหรับ iOS)
}
function playFrom(i){
  clearTimeout(advanceTimer);
  idx=Math.max(0,Math.min(i,SCENES.length-1));
  render();
  const myId=++playId, sc=SCENES[idx];
  speak(sc.say, ()=>{
    if(myId!==playId||!playing) return;
    if(idx<SCENES.length-1){ advanceTimer=setTimeout(()=>{ if(myId===playId&&playing) playFrom(idx+1); }, 550); }
    else finish();
  });
}
function finish(){ playing=false; updateUI(); }

function startVideo(){
  $('overlay').classList.add('hide');
  // ปลดล็อกเสียงในจังหวะที่ผู้ใช้กดปุ่ม (จำเป็นบน iOS/บางเบราว์เซอร์)
  try{
    if(window.speechSynthesis){
      loadVoices();
      speechSynthesis.cancel();
      const warm=new SpeechSynthesisUtterance('​');
      warm.volume=0; warm.lang='th-TH'; if(thVoice) warm.voice=thVoice;
      speechSynthesis.speak(warm);
    }
  }catch(e){}
  if(!thVoice){
    const sub=$('sub');
    if(sub) sub.insertAdjacentHTML('beforebegin','<div id="novoice" style="text-align:center;font-size:11.5px;color:#ffd9a6;margin-bottom:7px">⚠️ เครื่องนี้ไม่มีเสียงพากย์ไทย — เล่นแบบมีคำบรรยาย (ดูวิธีเพิ่มเสียงด้านล่าง)</div>');
  }
  playing=true; playFrom(0);
}
function togglePlay(){
  if(playing){ playing=false; stopAll(); updateUI(); }
  else { playing=true; if(idx>=SCENES.length-1) idx=0; playFrom(idx); }
}
function next(){ stopAll(); const n=Math.min(idx+1,SCENES.length-1); if(playing) playFrom(n); else {idx=n;render();} }
function prev(){ stopAll(); const n=Math.max(idx-1,0); if(playing) playFrom(n); else {idx=n;render();} }
function restart(){ stopAll(); if(playing) playFrom(0); else {idx=0;render();} }
function toggleMute(){ muted=!muted; updateUI(); stopAll(); if(playing) playFrom(idx); }
function cycleSpeed(){ rate=RATES[(RATES.indexOf(rate)+1)%RATES.length]; $('spdBtn').textContent=rate+'x'; stopAll(); if(playing) playFrom(idx); }

function updateUI(){
  $('playBtn').textContent = playing ? '⏸' : '▶';
  $('muteBtn').textContent = muted ? '🔇' : '🔊';
}

render();
</script>
